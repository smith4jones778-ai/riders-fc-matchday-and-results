<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - SBA Simulator</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script><style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:#f6f9ff;
  color:#1f2a44;
}

header{
  background:#fff;
  padding:18px 25px;
  box-shadow:0 8px 25px rgba(0,0,0,0.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  font-size:18px;
  color:#1e3a8a;
}

.container{
  max-width:1100px;
  margin:30px auto;
  padding:0 15px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  margin-bottom:15px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:13px;
  text-align:left;
}

button{
  background:#dc2626;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#b91c1c;
}

.badge{
  background:#e0ecff;
  color:#1e3a8a;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}
</style></head><body><header>
  <h1>Admin Dashboard - SBA Simulation</h1>
  <span class="badge">ADMIN PANEL</span>
</header><div class="container">
  <div class="card">
    <h3>All Applications</h3>
    <div id="data">Loading...</div>
  </div>
</div><script>
const firebaseConfig = {
  apiKey: "AIzaSyB-BUuIs7VCzeZgGXziqsAk-zr7UarRp4c",
  authDomain: "survey-d97e7.firebaseapp.com",
  databaseURL: "https://survey-d97e7-default-rtdb.firebaseio.com",
  projectId: "survey-d97e7",
  storageBucket: "survey-d97e7.firebasestorage.app",
  messagingSenderId: "861361956801",
  appId: "1:861361956801:web:65b2ee8eb04f5c2d5d3140",
  measurementId: "G-QW860EGGZ9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loadData(){
  const snap = await db.collection("applications").get();

  let html = `
  <table>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Phone</th>
      <th>Business</th>
      <th>State</th>
      <th>Grant</th>
      <th>Score</th>
      <th>Action</th>
    </tr>
  `;

  snap.forEach(doc => {
    const d = doc.data();

    html += `
      <tr>
        <td>${d.name}</td>
        <td>${d.email}</td>
        <td>${d.phone}</td>
        <td>${d.businessName}</td>
        <td>${d.state}</td>
        <td>$${d.grant}</td>
        <td>${d.eligibility}</td>
        <td><button onclick="deleteUser('${doc.id}')">Delete</button></td>
      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("data").innerHTML = html;
}

async function deleteUser(id){
  if(confirm("Are you sure you want to delete this record?")){
    await db.collection("applications").doc(id).delete();
    loadData();
  }
}

loadData();
</script></body>
</html>
